<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Decoraciones dibujadas en CSS puro</title>
<link rel="stylesheet" href="01_nota_rosa.css">
<link rel="stylesheet" href="02_nota_blanca.css">
<link rel="stylesheet" href="03_corazon_brillante.css">
<link rel="stylesheet" href="04_corazon_rosa_superior.css">
<link rel="stylesheet" href="05_notas_moradas.css">
<link rel="stylesheet" href="06_notas_rosas_dobles.css">
<link rel="stylesheet" href="07_corazon_contorno.css">
<link rel="stylesheet" href="08_notas_turquesa.css">
<link rel="stylesheet" href="09_estrella_naranja.css">
<link rel="stylesheet" href="10_estrella_amarilla.css">
<link rel="stylesheet" href="11_corazon_rosa_inferior.css">
<style>
  *{box-sizing:border-box} body{margin:0;background:#f4f5f9;color:#242633;font-family:system-ui,-apple-system,Segoe UI,sans-serif}
  main{max-width:980px;margin:auto;padding:36px 24px 48px} h1{font-size:clamp(1.6rem,3vw,2.4rem);margin:0 0 8px} p{margin:0 0 28px;color:#666b78}
  .galeria{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:18px}
  figure{margin:0;min-height:190px;padding:24px 16px 18px;border-radius:20px;background:white;display:flex;flex-direction:column;align-items:center;justify-content:center;box-shadow:0 10px 30px rgba(40,44,70,.08)}
  figcaption{margin-top:18px;font-size:.9rem;text-align:center;color:#4b5060}
</style>
</head><body><main>
<h1>Decoraciones dibujadas en CSS puro</h1>
<p>Sin PNG, sin SVG, sin Base64 y sin imágenes de fondo.</p>
<div class="galeria">
<figure><div class="css-nota-rosa"><span class="nota"><i class="cabeza"></i><i class="palo"></i><i class="bandera"></i></span><i class="brillo"></i></div><figcaption>01 · Nota rosa</figcaption></figure>
<figure><div class="css-nota-blanca"><span class="nota"><i class="cabeza"></i><i class="palo"></i><i class="bandera"></i></span></div><figcaption>02 · Nota blanca</figcaption></figure>
<figure><div class="css-corazon-brillante"><i class="borde"></i><i class="corazon"></i><i class="brillo"></i></div><figcaption>03 · Corazón brillante</figcaption></figure>
<figure><div class="css-corazon-rosa-superior"><i class="corazon"></i><i class="brillo"></i></div><figcaption>04 · Corazón rosa superior</figcaption></figure>
<figure><div class="css-notas-moradas"><span class="musica"><i class="barra"></i><i class="palo-izq"></i><i class="palo-der"></i><i class="cabeza-izq"></i><i class="cabeza-der"></i><i class="hueco"></i></span></div><figcaption>05 · Notas moradas</figcaption></figure>
<figure><div class="css-notas-rosas-dobles"><span class="musica"><i class="barra"></i><i class="palo-izq"></i><i class="palo-der"></i><i class="cabeza-izq"></i><i class="cabeza-der"></i></span></div><figcaption>06 · Notas rosas dobles</figcaption></figure>
<figure><div class="css-corazon-contorno"><i class="borde"></i><i class="corazon"></i><i class="brillo"></i></div><figcaption>07 · Corazón con contorno</figcaption></figure>
<figure><div class="css-nota-turquesa"><span class="nota"><i class="cabeza"></i><i class="palo"></i><i class="bandera"></i></span><i class="detalle"></i></div><figcaption>08 · Nota turquesa</figcaption></figure>
<figure><div class="css-estrella-naranja"><i class="borde"></i><i class="estrella"></i><i class="brillo"></i></div><figcaption>09 · Estrella naranja</figcaption></figure>
<figure><div class="css-estrella-amarilla"><i class="estrella"></i><i class="brillo"></i></div><figcaption>10 · Estrella amarilla</figcaption></figure>
<figure><div class="css-corazon-rosa-inferior"><i class="corazon"></i><i class="brillo"></i></div><figcaption>11 · Corazón rosa inferior</figcaption></figure>
</div></main></body></html>
